services:
  - type: web
    name: modelcouncil-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BACKEND
        value: nim
      # Set these in Render's Environment tab — never commit secrets to git.
      - key: NVIDIA_API_KEY
        sync: false
      - key: COUNCIL_MODELS
        value: mistralai/ministral-14b-instruct-2512,google/gemma-3-12b-it,meta/llama-3.1-8b-instruct
      - key: JUDGE_MODEL
        value: nvidia/nemotron-3-super-120b-a12b
      - key: NIM_BASE
        value: https://integrate.api.nvidia.com/v1

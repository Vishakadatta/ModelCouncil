services:
  - type: web
    name: modelcouncil-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BACKEND
        value: nim
      # Set these in Render's Environment tab — never commit secrets to git.
      - key: NVIDIA_API_KEY
        sync: false
      - key: COUNCIL_MODELS
        value: meta/llama-3.1-8b-instruct,mistralai/mistral-7b-instruct-v0.3,google/gemma-3-4b-it
      - key: JUDGE_MODEL
        value: nvidia/llama-3.1-nemotron-70b-instruct
      - key: NIM_BASE
        value: https://integrate.api.nvidia.com/v1

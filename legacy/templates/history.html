<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Council vs Giant</title>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d27; --surface2: #232734;
            --border: #2e3348; --text: #e1e4ed; --muted: #8b8fa3;
            --accent: #6c5ce7; --accent2: #00cec9;
            --giant: #fd79a8; --council: #6c5ce7;
            --judge: #fdcb6e; --success: #00b894;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border); padding: 24px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, var(--council), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header a {
            padding: 8px 16px; font-size: 13px;
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            text-decoration: none; font-family: inherit;
        }
        header a:hover { border-color: var(--accent); }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .stats-bar {
            display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px 24px; flex: 1; min-width: 140px;
        }
        .stat-card .num { font-size: 28px; font-weight: 700; color: var(--accent2); }
        .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; }

        table {
            width: 100%; border-collapse: collapse;
            background: var(--surface); border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border);
        }
        th {
            text-align: left; padding: 14px 16px; font-size: 12px;
            color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
            background: var(--surface2); border-bottom: 1px solid var(--border);
        }
        td {
            padding: 12px 16px; font-size: 13px;
            border-bottom: 1px solid var(--border);
            max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        tr:hover td { background: var(--surface2); }
        tr { cursor: pointer; }

        .mode-tag {
            display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px;
        }
        .mode-tag.all { background: linear-gradient(135deg, rgba(108,92,231,0.3), rgba(253,121,168,0.3)); color: var(--text); }
        .mode-tag.council { background: rgba(108,92,231,0.2); color: var(--council); }
        .mode-tag.giant { background: rgba(253,121,168,0.2); color: var(--giant); }
        .mode-tag.single { background: rgba(0,206,201,0.2); color: var(--accent2); }

        .time-col { color: var(--muted); }
        .id-col { color: var(--muted); font-size: 11px; }

        /* Detail modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 100;
            overflow-y: auto; padding: 40px 20px;
        }
        .modal {
            max-width: 900px; margin: 0 auto;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
        }
        .modal-header {
            padding: 20px 24px; background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 { font-size: 16px; }
        .modal-close {
            background: none; border: none; color: var(--muted);
            font-size: 20px; cursor: pointer; font-family: inherit;
        }
        .modal-body { padding: 24px; }
        .modal-meta {
            display: flex; gap: 20px; font-size: 12px; color: var(--muted);
            margin-bottom: 20px; flex-wrap: wrap;
        }

        .detail-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; margin-bottom: 12px; overflow: hidden;
        }
        .detail-card.judge { border-color: rgba(253,203,110,0.3); }
        .detail-card-header {
            padding: 10px 16px; font-size: 13px; font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .detail-card-body {
            padding: 16px; font-size: 13px; line-height: 1.7;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .detail-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; padding: 14px 0 6px; color: var(--muted);
        }
        .detail-label.council { color: var(--council); }
        .detail-label.giant { color: var(--giant); }
        .detail-label.judge { color: var(--judge); }

        .load-more {
            display: block; width: 100%; margin-top: 16px; padding: 12px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-family: inherit;
            font-size: 13px; cursor: pointer; text-align: center;
        }
        .load-more:hover { border-color: var(--accent); }

        .empty { text-align: center; padding: 60px; color: var(--muted); }
    </style>
</head>
<body>

<header>
    <h1>Query History</h1>
    <a href="/">Back to Ask</a>
</header>

<div class="container">
    <div class="stats-bar" id="statsBar"></div>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Question</th>
                <th>Mode</th>
                <th>Time</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <button class="load-more" id="loadMore" onclick="loadMore()" style="display:none;">Load More</button>
    <div class="empty" id="empty" style="display:none;">No queries yet. Go ask something!</div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 id="modalTitle">Query Detail</h2>
            <button class="modal-close" onclick="document.getElementById('modalOverlay').style.display='none'">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    let offset = 0;
    const LIMIT = 50;

    async function loadStats() {
        const resp = await fetch('/api/stats');
        const stats = await resp.json();
        const bar = document.getElementById('statsBar');
        let html = `<div class="stat-card"><div class="num">${stats.total_queries}</div><div class="label">Total Queries</div></div>`;
        for (const [mode, cnt] of Object.entries(stats.by_mode || {})) {
            html += `<div class="stat-card"><div class="num">${cnt}</div><div class="label">${mode} mode</div></div>`;
        }
        bar.innerHTML = html;
    }

    async function loadHistory() {
        const resp = await fetch(`/api/history?limit=${LIMIT}&offset=${offset}`);
        const data = await resp.json();
        const tbody = document.getElementById('tableBody');

        if (data.rows.length === 0 && offset === 0) {
            document.getElementById('empty').style.display = 'block';
            return;
        }

        for (const row of data.rows) {
            const tr = document.createElement('tr');
            tr.onclick = () => showDetail(row.id);
            const ts = row.timestamp ? new Date(row.timestamp).toLocaleString() : '';
            tr.innerHTML = `
                <td class="id-col">${row.id}</td>
                <td>${esc(row.question)}</td>
                <td><span class="mode-tag ${row.mode}">${row.mode}</span></td>
                <td class="time-col">${row.elapsed_seconds ? row.elapsed_seconds + 's' : '-'}</td>
                <td class="time-col">${ts}</td>
            `;
            tbody.appendChild(tr);
        }

        offset += data.rows.length;
        document.getElementById('loadMore').style.display =
            data.rows.length >= LIMIT ? 'block' : 'none';
    }

    function loadMore() { loadHistory(); }

    async function showDetail(id) {
        const resp = await fetch(`/api/history/${id}`);
        const entry = await resp.json();
        const data = entry.parsed_response;

        document.getElementById('modalTitle').textContent = `#${entry.id} - ${entry.question}`;
        let html = `<div class="modal-meta">
            <span>Mode: ${entry.mode}</span>
            <span>Time: ${entry.elapsed_seconds}s</span>
            <span>${new Date(entry.timestamp).toLocaleString()}</span>
        </div>`;

        if (data.mode === 'single') {
            html += detailLabel('Response', '');
            html += detailCard(data.model, data.answer);
        }

        if (data.mode === 'all') {
            html += detailLabel('Council Answers', 'council');
            for (const [m, a] of Object.entries(data.council_individual || {})) {
                html += detailCard(m, a);
            }
            html += detailLabel('Giant Answer', 'giant');
            html += detailCard(data.giant_model, data.giant_answer);
            html += detailLabel('Giant Judgment', 'judge');
            html += detailCard(data.giant_model + ' (Judge)', data.giant_judgment, true);
        }

        if (data.mode === 'council') {
            html += detailLabel('Council Answers', 'council');
            for (const [m, a] of Object.entries(data.individual || {})) {
                html += detailCard(m, a);
            }
            html += detailLabel('Giant Judgment', 'judge');
            html += detailCard(data.giant_model + ' (Judge)', data.giant_judgment, true);
        }

        if (data.mode === 'giant') {
            html += detailLabel('Giant Answer', 'giant');
            html += detailCard(data.giant_model, data.giant_answer);
            html += detailLabel('Council Judgments', 'judge');
            for (const [m, j] of Object.entries(data.council_judgments || {})) {
                html += detailCard(m + ' (Judge)', j, true);
            }
        }

        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('modalOverlay').style.display = 'block';
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modalOverlay')) {
            document.getElementById('modalOverlay').style.display = 'none';
        }
    }

    function detailLabel(text, type) {
        return `<div class="detail-label ${type}">${esc(text)}</div>`;
    }

    function detailCard(title, body, isJudge) {
        const cls = isJudge ? 'detail-card judge' : 'detail-card';
        return `<div class="${cls}">
            <div class="detail-card-header">${esc(title)}</div>
            <div class="detail-card-body">${esc(body || '(no response)')}</div>
        </div>`;
    }

    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // Escape key closes modal
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') document.getElementById('modalOverlay').style.display = 'none';
    });

    // Init
    loadStats();
    loadHistory();
</script>
</body>
</html>
